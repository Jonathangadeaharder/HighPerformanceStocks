name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  pull_request:
  schedule:
    - cron: '0 0 * * *' # Run at midnight UTC every day
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  preflight-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SvelteKit App
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: pnpm run build

  sync-and-update:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deploy branch
        uses: actions/checkout@v6
        with:
          ref: deploy
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Reset deploy to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          pip install nodriver
          sudo apt-get update && sudo apt-get install -y xvfb

      - name: Update stock data
        run: xvfb-run --auto-servernum pnpm run update-data

      - name: Commit updated data (if changed)
        run: |
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "chore: update daily stock data"
            echo "DATA_CHANGED=true" >> $GITHUB_ENV
          else
            echo "No data changes"
            echo "DATA_CHANGED=false" >> $GITHUB_ENV
          fi

      - name: Push deploy branch
        run: git push origin deploy --force-with-lease

  build-and-deploy:
    if: github.event_name != 'pull_request'
    needs: sync-and-update
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deploy branch
        uses: actions/checkout@v6
        with:
          ref: deploy

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SvelteKit App
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'build/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
