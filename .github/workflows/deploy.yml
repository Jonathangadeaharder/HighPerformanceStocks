name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * *' # Run at midnight UTC every day
  workflow_dispatch:

permissions:
  contents: write # Needed for committing back data
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  update-data:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update Data
        run: pnpm run update-data

      - name: Commit and Push updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/

          if ! git diff --staged --quiet; then
            git commit -m "chore: update daily stock data"
            for attempt in 1 2 3; do
              if git pull --rebase origin main; then
                if git push origin main; then
                  echo "Push succeeded on attempt $attempt"
                  exit 0
                fi
              else
                echo "git pull --rebase failed on attempt $attempt, aborting rebase..."
                git rebase --abort || true
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "Failed to push after 3 attempts"
                exit 1
              fi
              echo "Push attempt $attempt failed, retrying in 5s..."
              sleep 5
            done
          else
            echo "No data changes to commit"
          fi

  build-and-deploy:
    # Only run on push events (including the data-update commit pushed above).
    # The schedule/workflow_dispatch run's update-data job pushes a new commit,
    # which triggers its own push-event workflow run that handles the deploy.
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SvelteKit App
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
