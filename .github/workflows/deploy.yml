name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * *' # Run at midnight UTC every day
  workflow_dispatch:

permissions:
  contents: write # Needed for committing back data
  pages: write
  id-token: write
  pull-requests: write # Needed to create and merge PRs

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
        
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Update Data
        run: pnpm run update-data

      - name: Commit and Push updated data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          
          if ! git diff --staged --quiet; then
            # Check if the last commit was a data update
            LAST_COMMIT_MSG=$(git log -1 --pretty=%B)
            
            if [[ "$LAST_COMMIT_MSG" == *"chore: update daily stock data"* ]]; then
              # Amend the previous commit so we don't spam history
              git commit --amend --no-edit
            else
              # Create a new commit
              git commit -m "chore: update daily stock data"
            fi
            
            # Since we are using an amend, we need to force push. 
            # Note: A personal access token (PAT) must be passed as a secret if branch protection is strictly enforced.
            git push origin main --force
          fi

  build-and-deploy:
    needs: update-data
    # Run if update-data was skipped (push event) OR if it ran successfully
    if: |
      always() && 
      (needs.update-data.result == 'success' || needs.update-data.result == 'skipped')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          ref: main # Ensure we pull the latest main with the merged PR data

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build SvelteKit App
        env:
          BASE_PATH: '/${{ github.event.repository.name }}'
        run: pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
